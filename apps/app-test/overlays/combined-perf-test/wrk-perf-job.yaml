apiVersion: batch/v1
kind: Job
metadata:
  name: wrk-perf-test
  namespace: iperf-test
  labels:
    app: wrk-perf-test
    tier: client
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: wrk-perf-test
        tier: client
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-hello-world
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until nc -z hello-world 80; do
                echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] waiting for hello-world:80..."
                sleep 2
              done
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] hello-world server is ready"
      containers:
        - name: wrk-client
          image: williamyeh/wrk:latest
          imagePullPolicy: IfNotPresent
          # 4 threads, 100 connections, 300s — Lua script writes JSON to /results/wrk-result.json
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mkdir -p /results
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting wrk test"
              echo "  Target  : ${TARGET_URL}"
              echo "  Duration: 300s"
              echo "  Threads : 4"
              echo "  Conns   : 100"
              echo "  Format  : JSON (via Lua report script)"
              wrk \
                -d 300s \
                -t 4 \
                -c 100 \
                --latency \
                -s /scripts/report.lua \
                "${TARGET_URL}"
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] wrk test complete — results written to /results/wrk-result.json"
          env:
            - name: TARGET_URL
              value: "http://hello-world.iperf-test.svc.cluster.local/"
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "256Mi"
          volumeMounts:
            - name: results
              mountPath: /results
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: results
          emptyDir: {}
        - name: scripts
          configMap:
            name: wrk-scripts
            defaultMode: 0755
