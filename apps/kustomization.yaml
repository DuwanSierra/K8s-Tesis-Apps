apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Este archivo le dice al parent App of Apps en ArgoCD exactamente qué
# recursos desplegar. Solo se listan ArgoCD Application YAMLs — los
# manifests crudos de cada app (ej: cni_test_iperf/) los gestiona cada
# Application hija por separado.
resources:
  - metrics/kube-prometheus-stack-crds.yaml
  - metrics/kube-prometheus-stack-app.yaml
  #- cni_test_iperf/application.yaml
