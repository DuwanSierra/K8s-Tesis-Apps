apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: iperf-test
  labels:
    app: hello-world
    tier: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
        tier: server
    spec:
      containers:
        - name: hello-world
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
