# ─────────────────────────────────────────────────────────────────────────────
# iperf3 Client – CronJob
#
# Exporta una corrida por ejecución en un JSON normalizado para análisis,
# almacenado por CNI/tipo de prueba con retención máxima de 5 corridas.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iperf3-client
  namespace: cni-test
  labels:
    app: iperf3-client
    component: network-benchmark
    app.kubernetes.io/part-of: cni-test
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # Documentación: primera ejecución ocurre dentro de 10 min tras el deploy
    cni-test/description: "Prueba de throughput L3 con iperf3 – 5 min / intervalo 10 s / JSON"
spec:
  # Disparo en dos ventanas por hora para evitar solape con otras pruebas.
  # Ventanas objetivo: minuto 0 y 30.
  schedule: "0,30 * * * *"

  # Si el Job anterior todavía corre (p.ej. fallo de red) no lanzar otro en paralelo.
  concurrencyPolicy: Forbid

  # Ventana máxima de retraso aceptable antes de cancelar el disparo perdido.
  startingDeadlineSeconds: 120

  # Historial de Jobs para depuración (kubectl get jobs -n cni-test)
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      # Sin reintentos automáticos; si falla se registra y se espera el próximo ciclo.
      backoffLimit: 1

      # TTL: los Pods completados se limpian 1 hora después para no acumular basura.
      ttlSecondsAfterFinished: 3600

      template:
        metadata:
          labels:
            app: iperf3-client
            component: network-benchmark
        spec:
          restartPolicy: Never

          # El cliente prefiere un nodo distinto al servidor para forzar inter-nodo.
          # Quitar este bloque si se quiere medir intra-nodo.
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: iperf3-server
                    topologyKey: "kubernetes.io/hostname"

          # Esperar a que el servidor esté listo antes de iniciar la prueba.
          initContainers:
            - name: wait-for-server
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  echo "[init] Esperando que DNS resuelva iperf3-server..."
                  until nslookup iperf3-server.cni-test.svc.cluster.local >/dev/null 2>&1; do
                    echo "[init] DNS aun no disponible, reintentando en 5s...";
                    sleep 5;
                  done
                  echo "[init] DNS listo. Iniciando prueba."
              resources:
                requests:
                  cpu: "10m"
                  memory: "16Mi"
                limits:
                  cpu: "50m"
                  memory: "32Mi"

          containers:
            - name: iperf3-client
              image: alpine:3.20
              command:
                - sh
                - -c
                - |
                  set -eu

                  CURRENT_STEP="bootstrap"

                  log() {
                    printf '%s [%-5s] %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$1" "$2"
                  }

                  step() {
                    CURRENT_STEP="$1"
                    log INFO "${CURRENT_STEP}"
                  }

                  on_exit() {
                    rc="$?"
                    if [ "${rc}" -ne 0 ]; then
                      log ERROR "Fallo en paso: ${CURRENT_STEP} (exit=${rc})"
                      log ERROR "Diagnostico rapido DNS/TCP contra iperf3-server"
                      nslookup iperf3-server.cni-test.svc.cluster.local 2>&1 | sed 's/^/[diag] /' || true
                      nc -vz iperf3-server.cni-test.svc.cluster.local 5201 2>&1 | sed 's/^/[diag] /' || true

                      if [ -n "${RAW_IPERF_FILE:-}" ] && [ -f "${RAW_IPERF_FILE}" ]; then
                        log INFO "JSON raw parcial detectado en RAW_IPERF_FILE=${RAW_IPERF_FILE}"
                        tail -n 20 "${RAW_IPERF_FILE}" | sed 's/^/[iperf3] /' || true
                      fi

                      if [ -n "${RUN_FILE:-}" ] && [ -f "${RUN_FILE}" ]; then
                        log INFO "JSON normalizado parcial detectado en RUN_FILE=${RUN_FILE}"
                        tail -n 20 "${RUN_FILE}" | sed 's/^/[run] /' || true
                      fi

                      echo "[debug] Fallo detectado (exit=${rc}). Manteniendo el pod ${DEBUG_HOLD_SECONDS}s para inspeccion..."
                      sleep "${DEBUG_HOLD_SECONDS}"
                    else
                      log INFO "Ejecucion finalizada correctamente"
                    fi
                    exit "${rc}"
                  }
                  trap 'on_exit' EXIT

                  step "Instalando dependencias"
                  apk add --no-cache iperf3 git ca-certificates jq >/dev/null

                  step "Preparando rutas y nombres de salida"
                  TS="$(date -u +%Y%m%dT%H%M%SZ)"
                  OUTPUT_DIR="/tmp/results/iperf3"
                  RAW_IPERF_FILE="${OUTPUT_DIR}/raw_iperf3_${CNI_NAME}_${TS}.json"
                  RUN_FILE="${OUTPUT_DIR}/run_iperf3_${CNI_NAME}_${TS}.json"
                  TEST_TYPE="throughput_tcp"
                  TARGET_HOST="iperf3-server.cni-test.svc.cluster.local"
                  TARGET_PORT="5201"
                  RETENTION_MAX_RUNS="5"

                  mkdir -p "${OUTPUT_DIR}"

                  step "Ejecutando prueba iperf3"
                  iperf3 \
                    -c "${TARGET_HOST}" \
                    -p "${TARGET_PORT}" \
                    -t 300 \
                    -i 10 \
                    -J > "${RAW_IPERF_FILE}"

                  step "Generando JSON normalizado de corrida"
                  SENDER_BPS="$(jq -r '.end.sum_sent.bits_per_second // 0' "${RAW_IPERF_FILE}")"
                  RECEIVER_BPS="$(jq -r '.end.sum_received.bits_per_second // 0' "${RAW_IPERF_FILE}")"
                  RETRANSMITS="$(jq -r '.end.sum_sent.retransmits // 0' "${RAW_IPERF_FILE}")"
                  DURATION_SECONDS="$(jq -r '.end.sum_received.seconds // .start.test_start.duration // 300' "${RAW_IPERF_FILE}")"

                  cat > "${RUN_FILE}" <<EOF
                  {
                    "timestamp_utc": "${TS}",
                    "benchmark_type": "${TEST_TYPE}",
                    "cni_name": "${CNI_NAME}",
                    "namespace": "cni-test",
                    "source": "cronjob/iperf3-client",
                    "measurement_human": {
                      "objective": "Medir throughput TCP L3 entre pods via Service usando iperf3",
                      "what_is_measured": "bits_per_second de envio y recepcion, y retransmisiones TCP",
                      "topology_hint": "inter-nodo por anti-affinity preferente; para intra-nodo quitar anti-affinity",
                      "traffic_profile": "iperf3 -t 300 -i 10 -J",
                      "target": "${TARGET_HOST}:${TARGET_PORT}",
                      "decision_usage": "Comparar CNIs por throughput efectivo y estabilidad (retransmisiones)"
                    },
                    "summary": {
                      "duration_seconds": ${DURATION_SECONDS},
                      "sender_bits_per_second": ${SENDER_BPS},
                      "receiver_bits_per_second": ${RECEIVER_BPS},
                      "retransmits": ${RETRANSMITS}
                    },
                    "raw":
                  $(cat "${RAW_IPERF_FILE}")
                  }
                  EOF

                  step "Configurando autenticacion Git"
                  export GIT_TERMINAL_PROMPT=0
                  export GIT_ASKPASS=/tmp/git-askpass.sh
                  cat > "${GIT_ASKPASS}" <<'EOF'
                  #!/bin/sh
                  case "$1" in
                    *Username*) echo "$GIT_USER" ;;
                    *Password*) echo "$GIT_TOKEN" ;;
                  esac
                  EOF
                  chmod 700 "${GIT_ASKPASS}"

                  step "Clonando repositorio de resultados"
                  rm -rf /tmp/repo
                  git clone --depth 1 --branch "${GIT_BRANCH}" "${GIT_REPO_URL}" /tmp/repo

                  step "Copiando artifacts al repositorio"
                  DEST_DIR="/tmp/repo/${GIT_RESULTS_PATH}/${CNI_NAME}/${TEST_TYPE}"
                  mkdir -p "${DEST_DIR}"
                  cp "${RUN_FILE}" "${DEST_DIR}/run_${TS}.json"

                  step "Aplicando retencion maxima de 5 corridas"
                  cd "${DEST_DIR}"
                  ls -1t run_*.json 2>/dev/null | awk "NR>${RETENTION_MAX_RUNS}" | xargs -r rm -f

                  step "Commit y push de resultados"
                  cd /tmp/repo
                  git config user.name "${GIT_AUTHOR_NAME}"
                  git config user.email "${GIT_AUTHOR_EMAIL}"
                  git add "${GIT_RESULTS_PATH}/${CNI_NAME}/${TEST_TYPE}"
                  git commit -m "results(throughput): ${CNI_NAME} ${TS} (max5)" || true
                  git push origin "${GIT_BRANCH}"
              env:
                - name: GIT_REPO_URL
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_REPO_URL
                - name: GIT_BRANCH
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_BRANCH
                - name: GIT_RESULTS_PATH
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_RESULTS_PATH
                - name: GIT_AUTHOR_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_AUTHOR_NAME
                - name: GIT_AUTHOR_EMAIL
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_AUTHOR_EMAIL
                - name: CNI_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: CNI_NAME
                - name: GIT_USER
                  valueFrom:
                    secretKeyRef:
                      name: cni-results-git-credentials
                      key: GIT_USER
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cni-results-git-credentials
                      key: GIT_TOKEN
                - name: DEBUG_HOLD_SECONDS
                  value: "600"
              resources:
                requests:
                  cpu: "100m"
                  memory: "64Mi"
                limits:
                  # Sin límite agresivo de CPU para no throttlear el generador de carga.
                  cpu: "1000m"
                  memory: "128Mi"
