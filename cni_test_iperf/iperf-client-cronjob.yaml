# ─────────────────────────────────────────────────────────────────────────────
# iperf3 Client – CronJob
#
# Diseño: CronJob con schedule "*/10 * * * *" (cada 10 minutos).
# Esto garantiza que el primer disparo ocurra dentro de los 10 minutos
# posteriores a la instalación del app en ArgoCD, cumpliendo el requerimiento
# de "ejecutarse a los 10 minutos".
#
# Parámetros de prueba (alineados con la metodología de la tesis):
#   -t 300   → Duración: 5 minutos (300 s) de tráfico continuo
#   -i 10    → Intervalo: muestra cada 10 s → 30 puntos de datos por ejecución
#   -J       → Salida en formato JSON (para análisis posterior)
#   -p 5201  → Puerto del servidor
#
# Para medir intra-nodo: eliminar el podAffinity de este manifiesto y del
# servidor para que ambos caigan en el mismo nodo.
# Para medir inter-nodo: mantener el podAntiAffinity del servidor (default).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iperf3-client
  namespace: cni-test
  labels:
    app: iperf3-client
    component: network-benchmark
    app.kubernetes.io/part-of: cni-test
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # Documentación: primera ejecución ocurre dentro de 10 min tras el deploy
    cni-test/description: "Prueba de throughput L3 con iperf3 – 5 min / intervalo 10 s / JSON"
spec:
  # Disparo: cada 6 minutos.
  # Primera ejecución garantizada dentro de los 6 min post-instalación.
  # Para uso periódico en investigación se puede cambiar a "@hourly" o "0 */6 * * *".
  schedule: "*/6 * * * *"

  # Si el Job anterior todavía corre (p.ej. fallo de red) no lanzar otro en paralelo.
  concurrencyPolicy: Forbid

  # Ventana máxima de retraso aceptable antes de cancelar el disparo perdido.
  startingDeadlineSeconds: 120

  # Historial de Jobs para depuración (kubectl get jobs -n cni-test)
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      # Sin reintentos automáticos; si falla se registra y se espera el próximo ciclo.
      backoffLimit: 1

      # TTL: los Pods completados se limpian 1 hora después para no acumular basura.
      ttlSecondsAfterFinished: 3600

      template:
        metadata:
          labels:
            app: iperf3-client
            component: network-benchmark
        spec:
          restartPolicy: Never

          # El cliente prefiere un nodo distinto al servidor para forzar inter-nodo.
          # Quitar este bloque si se quiere medir intra-nodo.
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: iperf3-server
                    topologyKey: "kubernetes.io/hostname"

          # Esperar a que el servidor esté listo antes de iniciar la prueba.
          initContainers:
            - name: wait-for-server
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  echo "[init] Esperando que el servidor iperf3 responda en 5201..."
                  until nc -zw3 iperf3-server.cni-test.svc.cluster.local 5201; do
                    echo "[init] Servidor no disponible, reintentando en 5s...";
                    sleep 5;
                  done
                  echo "[init] Servidor listo. Iniciando prueba."
              resources:
                requests:
                  cpu: "10m"
                  memory: "16Mi"
                limits:
                  cpu: "50m"
                  memory: "32Mi"

          containers:
            - name: iperf3-client
              image: alpine:3.20
              command:
                - sh
                - -c
                - |
                  set -eu

                  on_exit() {
                    rc="$?"
                    if [ "${rc}" -ne 0 ]; then
                      echo "[debug] Fallo detectado (exit=${rc}). Manteniendo el pod ${DEBUG_HOLD_SECONDS}s para inspeccion..."
                      sleep "${DEBUG_HOLD_SECONDS}"
                    fi
                    exit "${rc}"
                  }
                  trap 'on_exit' EXIT

                  apk add --no-cache iperf3 git ca-certificates >/dev/null

                  TS="$(date -u +%Y%m%dT%H%M%SZ)"
                  OUTPUT_DIR="/tmp/results/iperf3"
                  RESULT_FILE="${OUTPUT_DIR}/iperf3_${CNI_NAME}_${TS}.json"
                  META_FILE="${OUTPUT_DIR}/iperf3_${CNI_NAME}_${TS}.meta"

                  mkdir -p "${OUTPUT_DIR}"

                  iperf3 \
                    -c iperf3-server.cni-test.svc.cluster.local \
                    -p 5201 \
                    -t 300 \
                    -i 10 \
                    -J > "${RESULT_FILE}"

                  cat > "${META_FILE}" <<EOF
                  timestamp_utc=${TS}
                  benchmark_type=throughput_tcp
                  cni_name=${CNI_NAME}
                  namespace=cni-test
                  source=cronjob/iperf3-client
                  EOF

                  export GIT_TERMINAL_PROMPT=0
                  export GIT_ASKPASS=/tmp/git-askpass.sh
                  cat > "${GIT_ASKPASS}" <<'EOF'
                  #!/bin/sh
                  case "$1" in
                    *Username*) echo "$GIT_USER" ;;
                    *Password*) echo "$GIT_TOKEN" ;;
                  esac
                  EOF
                  chmod 700 "${GIT_ASKPASS}"

                  rm -rf /tmp/repo
                  git clone --depth 1 --branch "${GIT_BRANCH}" "${GIT_REPO_URL}" /tmp/repo

                  mkdir -p "/tmp/repo/${GIT_RESULTS_PATH}/iperf3"
                  cp "${RESULT_FILE}" "/tmp/repo/${GIT_RESULTS_PATH}/iperf3/"
                  cp "${META_FILE}" "/tmp/repo/${GIT_RESULTS_PATH}/iperf3/"

                  cd /tmp/repo
                  git config user.name "${GIT_AUTHOR_NAME}"
                  git config user.email "${GIT_AUTHOR_EMAIL}"
                  git add "${GIT_RESULTS_PATH}/iperf3"
                  git commit -m "results(iperf3): ${CNI_NAME} ${TS}" || true
                  git push origin "${GIT_BRANCH}"
              env:
                - name: GIT_REPO_URL
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_REPO_URL
                - name: GIT_BRANCH
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_BRANCH
                - name: GIT_RESULTS_PATH
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_RESULTS_PATH
                - name: GIT_AUTHOR_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_AUTHOR_NAME
                - name: GIT_AUTHOR_EMAIL
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_AUTHOR_EMAIL
                - name: CNI_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: CNI_NAME
                - name: GIT_USER
                  valueFrom:
                    secretKeyRef:
                      name: cni-results-git-credentials
                      key: GIT_USER
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cni-results-git-credentials
                      key: GIT_TOKEN
                - name: DEBUG_HOLD_SECONDS
                  value: "600"
              resources:
                requests:
                  cpu: "100m"
                  memory: "64Mi"
                limits:
                  # Sin límite agresivo de CPU para no throttlear el generador de carga.
                  cpu: "1000m"
                  memory: "128Mi"
