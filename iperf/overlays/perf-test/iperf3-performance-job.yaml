apiVersion: batch/v1
kind: Job
metadata:
  name: iperf3-performance-test
  namespace: iperf-test
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: iperf3-performance-test
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-server
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - >-
              until nc -z iperf3-server 5201; do
                echo "waiting for iperf3-server";
                sleep 2;
              done
      containers:
        - name: runner
          image: networkstatic/iperf3:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /scripts/iperf-test.sh
          env:
            - name: SERVER_HOST
              value: iperf3-server.iperf-test.svc.cluster.local
            - name: TCP_RUNS
              value: "3"
            - name: UDP_RUNS
              value: "3"
            - name: TCP_PARALLEL
              value: "4"
            - name: TCP_DURATION
              value: "30"
            - name: UDP_DURATION
              value: "30"
            - name: UDP_BANDWIDTH
              value: 500M
            - name: RESULT_DIR
              value: /results
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: results
              mountPath: /results
      volumes:
        - name: scripts
          configMap:
            name: iperf3-test-script
            defaultMode: 0755
        - name: results
          emptyDir: {}
