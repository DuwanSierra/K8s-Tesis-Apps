# ─────────────────────────────────────────────────────────────────────────────
# Latency Client – CronJob
#
# Ejecuta una prueba de latencia (ICMP) contra el Service del servidor iperf3
# y exporta resultados (raw + summary JSON) a un repositorio Git.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: latency-client
  namespace: cni-test
  labels:
    app: latency-client
    component: network-benchmark
    app.kubernetes.io/part-of: cni-test
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    cni-test/description: "Prueba de latencia ICMP con ping + exportación Git"
spec:
  # Offset de 5 minutos respecto al cron de throughput (*/6).
  # Si throughput inicia en minuto 0, la latencia corre en minuto 5.
  schedule: "5-59/6 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: latency-client
            component: network-benchmark
        spec:
          restartPolicy: Never
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: iperf3-server
                    topologyKey: "kubernetes.io/hostname"
          initContainers:
            - name: wait-for-server
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  echo "[init] Esperando que DNS resuelva iperf3-server..."
                  until nslookup iperf3-server.cni-test.svc.cluster.local >/dev/null 2>&1; do
                    echo "[init] DNS aun no disponible, reintentando en 5s...";
                    sleep 5;
                  done
                  echo "[init] DNS listo. Iniciando prueba de latencia."
              resources:
                requests:
                  cpu: "10m"
                  memory: "16Mi"
                limits:
                  cpu: "50m"
                  memory: "32Mi"
          containers:
            - name: latency-client
              image: alpine:3.20
              command:
                - sh
                - -c
                - |
                  set -eu

                  on_exit() {
                    rc="$?"
                    if [ "${rc}" -ne 0 ]; then
                      echo "[debug] Fallo detectado (exit=${rc}). Manteniendo el pod ${DEBUG_HOLD_SECONDS}s para inspeccion..."
                      sleep "${DEBUG_HOLD_SECONDS}"
                    fi
                    exit "${rc}"
                  }
                  trap 'on_exit' EXIT

                  apk add --no-cache iputils git ca-certificates >/dev/null

                  TS="$(date -u +%Y%m%dT%H%M%SZ)"
                  OUTPUT_DIR="/tmp/results/latency"
                  RAW_FILE="${OUTPUT_DIR}/ping_${CNI_NAME}_${TS}.log"
                  JSON_FILE="${OUTPUT_DIR}/ping_${CNI_NAME}_${TS}.json"

                  mkdir -p "${OUTPUT_DIR}"

                  ping -c 30 -i 1 -W 1 iperf3-server.cni-test.svc.cluster.local > "${RAW_FILE}"

                  PACKETS_LINE="$(grep -E 'packets transmitted' "${RAW_FILE}" | tail -n1)"
                  RTT_LINE="$(grep -E 'rtt min/avg/max' "${RAW_FILE}" | tail -n1 || true)"

                  TX="$(echo "${PACKETS_LINE}" | awk '{print $1}')"
                  RX="$(echo "${PACKETS_LINE}" | awk '{print $4}')"
                  LOSS="$(echo "${PACKETS_LINE}" | awk -F', ' '{print $3}' | awk '{print $1}' | tr -d '%')"

                  if [ -n "${RTT_LINE}" ]; then
                    RTT_VALUES="$(echo "${RTT_LINE}" | awk -F'=' '{print $2}' | xargs)"
                    RTT_MIN="$(echo "${RTT_VALUES}" | cut -d'/' -f1)"
                    RTT_AVG="$(echo "${RTT_VALUES}" | cut -d'/' -f2)"
                    RTT_MAX="$(echo "${RTT_VALUES}" | cut -d'/' -f3)"
                    RTT_MDEV="$(echo "${RTT_VALUES}" | cut -d'/' -f4 | awk '{print $1}')"
                  else
                    RTT_MIN="null"
                    RTT_AVG="null"
                    RTT_MAX="null"
                    RTT_MDEV="null"
                  fi

                  cat > "${JSON_FILE}" <<EOF
                  {
                    "timestamp_utc": "${TS}",
                    "benchmark_type": "latency_icmp",
                    "cni_name": "${CNI_NAME}",
                    "namespace": "cni-test",
                    "target": "iperf3-server.cni-test.svc.cluster.local",
                    "packets_transmitted": ${TX},
                    "packets_received": ${RX},
                    "packet_loss_percent": ${LOSS},
                    "rtt_min_ms": ${RTT_MIN},
                    "rtt_avg_ms": ${RTT_AVG},
                    "rtt_max_ms": ${RTT_MAX},
                    "rtt_mdev_ms": ${RTT_MDEV}
                  }
                  EOF

                  export GIT_TERMINAL_PROMPT=0
                  export GIT_ASKPASS=/tmp/git-askpass.sh
                  cat > "${GIT_ASKPASS}" <<'EOF'
                  #!/bin/sh
                  case "$1" in
                    *Username*) echo "$GIT_USER" ;;
                    *Password*) echo "$GIT_TOKEN" ;;
                  esac
                  EOF
                  chmod 700 "${GIT_ASKPASS}"

                  rm -rf /tmp/repo
                  git clone --depth 1 --branch "${GIT_BRANCH}" "${GIT_REPO_URL}" /tmp/repo

                  mkdir -p "/tmp/repo/${GIT_RESULTS_PATH}/latency"
                  cp "${RAW_FILE}" "/tmp/repo/${GIT_RESULTS_PATH}/latency/"
                  cp "${JSON_FILE}" "/tmp/repo/${GIT_RESULTS_PATH}/latency/"

                  cd /tmp/repo
                  git config user.name "${GIT_AUTHOR_NAME}"
                  git config user.email "${GIT_AUTHOR_EMAIL}"
                  git add "${GIT_RESULTS_PATH}/latency"
                  git commit -m "results(latency): ${CNI_NAME} ${TS}" || true
                  git push origin "${GIT_BRANCH}"
              env:
                - name: GIT_REPO_URL
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_REPO_URL
                - name: GIT_BRANCH
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_BRANCH
                - name: GIT_RESULTS_PATH
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_RESULTS_PATH
                - name: GIT_AUTHOR_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_AUTHOR_NAME
                - name: GIT_AUTHOR_EMAIL
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: GIT_AUTHOR_EMAIL
                - name: CNI_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: cni-results-git-config
                      key: CNI_NAME
                - name: GIT_USER
                  valueFrom:
                    secretKeyRef:
                      name: cni-results-git-credentials
                      key: GIT_USER
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cni-results-git-credentials
                      key: GIT_TOKEN
                - name: DEBUG_HOLD_SECONDS
                  value: "600"
              resources:
                requests:
                  cpu: "100m"
                  memory: "64Mi"
                limits:
                  cpu: "500m"
                  memory: "128Mi"
