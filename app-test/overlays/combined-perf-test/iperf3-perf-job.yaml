apiVersion: batch/v1
kind: Job
metadata:
  name: iperf3-perf-test
  namespace: iperf-test
  labels:
    app: iperf3-perf-test
    tier: client
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: iperf3-perf-test
        tier: client
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-iperf3-server
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until nc -z iperf3-server 5201; do
                echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] waiting for iperf3-server:5201..."
                sleep 2
              done
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] iperf3-server is ready"
      containers:
        - name: iperf3-client
          image: networkstatic/iperf3:latest
          imagePullPolicy: IfNotPresent
          # duration=300s, interval=10s => 30 data points in JSON output
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mkdir -p /results
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting iperf3 test"
              echo "  Server  : ${SERVER_HOST}"
              echo "  Duration: 300s"
              echo "  Interval: 10s  (30 data points)"
              echo "  Format  : JSON"
              iperf3 \
                -c "${SERVER_HOST}" \
                -t 300 \
                -i 10 \
                -J \
                > /results/iperf3-result.json
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] iperf3 test complete — $(wc -c < /results/iperf3-result.json) bytes written to /results/iperf3-result.json"
          env:
            - name: SERVER_HOST
              value: "iperf3-server.iperf-test.svc.cluster.local"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: results
              mountPath: /results
      volumes:
        - name: results
          emptyDir: {}
